<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Accords Guitare — Flashcards</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#B85C2A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Accords Guitare" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #F5F0E8;
      --card:         #FFFFFF;
      --text:         #1C1C1C;
      --muted:        #8C8880;
      --accent:       #B85C2A;
      --accent-light: #F5E0CE;
      --correct:      #2D8C5F;
      --wrong:        #C03A2B;
      --border:       #E8E0D5;
      --mode-ess:     #2D7D5A;
      --mode-ess-bg:  #E3F2EB;
      --mode-comp:    #2A5FA8;
      --mode-comp-bg: #E3EDFA;
      --mode-all:     #7D2A85;
      --mode-all-bg:  #F3E5F5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 24px;
    }
    #app { width: 100%; max-width: 430px; display: flex; flex-direction: column; align-items: center; flex: 1; }
    .app-footer { width: 100%; max-width: 430px; text-align: center; padding: 18px 0 10px; font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 300; color: var(--muted); opacity: 0.55; }
    .footer-link { color: inherit; text-decoration: underline; text-decoration-color: var(--border); transition: opacity .15s; }
    .footer-link:hover { opacity: 1; }

    /* ── HEADER ── */
    .header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 18px 0 14px; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 19px; letter-spacing: -.3px; }
    .header-title b { color: var(--accent); font-weight: 700; }
    .btn-ghost { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; color: var(--accent); background: var(--accent-light); border: none; padding: 7px 14px; border-radius: 20px; cursor: pointer; transition: opacity .15s; }
    .btn-ghost:hover { opacity: .72; }

    /* ── PROGRESS BAR ── */
    .prog-wrap { width: 100%; margin-bottom: 18px; }
    .prog-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 7px; }
    .prog-meta .tries-count { font-weight: 600; color: var(--text); }
    .prog-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 3px; transition: width .35s ease, background .35s ease; }

    /* Bouton "Fin de la session libre" — visible uniquement en mode libre */
    .btn-end-free {
      width: 100%; padding: 14px; margin-top: 14px;
      font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
      color: var(--accent); background: var(--accent-light);
      border: 1.5px solid var(--accent); border-radius: 14px;
      cursor: pointer; transition: opacity .12s, transform .1s;
      box-shadow: 0 2px 8px rgba(184,92,42,.18);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-end-free:hover  { opacity: .85; }
    .btn-end-free:active { transform: scale(.985); }

    /* ── POPUP MISE À JOUR (bloquante, centrée, overlay) ── */
    .update-overlay {
      position: fixed; inset: 0;
      background: rgba(28, 28, 28, .55);
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
      animation: fadeUp .3s ease;
      padding: 20px;
    }
    .update-popup {
      background: var(--card);
      border-radius: 22px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .25);
      padding: 32px 28px 26px;
      max-width: 360px; width: 100%;
      text-align: center;
      animation: popIn .42s cubic-bezier(.34, 1.56, .64, 1);
    }
    .update-popup-icon { font-size: 44px; margin-bottom: 10px; }
    .update-popup-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px; letter-spacing: -.5px;
      margin-bottom: 10px;
    }
    .update-popup-body {
      font-size: 14px; color: var(--muted);
      font-weight: 300; line-height: 1.5;
      margin-bottom: 22px;
    }
    .update-popup-btn {
      width: 100%; padding: 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px; font-weight: 600;
      background: var(--accent); color: #FFF;
      border: none; border-radius: 14px;
      cursor: pointer;
      transition: opacity .12s, transform .1s;
      box-shadow: 0 4px 16px rgba(184, 92, 42, .3);
    }
    .update-popup-btn:hover  { opacity: .88; }
    .update-popup-btn:active { transform: scale(.985); }

    /* ── CARD ── */
    .card-scene { width: 100%; perspective: 900px; margin-bottom: 20px; }
    .card-body { width: 100%; height: 400px; position: relative; transform-style: preserve-3d; transition: transform .52s cubic-bezier(.4,0,.2,1); }
    .card-body.flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; inset: 0; background: var(--card); border-radius: 22px; box-shadow: 0 2px 10px rgba(0,0,0,.06), 0 8px 28px rgba(0,0,0,.07); backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 18px 24px; overflow: hidden; }
    .card-face.back { transform: rotateY(180deg); }
    /* Face avec diagramme (question OU réponse) : layout strictement identique */
    .card-face.has-diag { justify-content: center; padding-top: 18px; padding-bottom: 18px; }
    .face-tag {
      font-size: 22px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted); text-align: center; line-height: 1.3;
      /* Hauteur reservee 2 lignes : tag 1L et tag 2L commencent en haut du meme slot,
         donc le diagramme/nom qui suit est strictement a la meme position dans les 2 cas */
      min-height: 2.6em;
      margin-bottom: 16px;
    }
    .face-tag.hi { color: var(--accent); }
    .chord-big { font-family: 'Playfair Display', serif; font-size: 120px; line-height: 1; letter-spacing: -3.5px; text-align: center; }
    .chord-big.md { font-size: 95px; letter-spacing: -2.5px; }
    .chord-big.sm { font-size: 72px; letter-spacing: -1.5px; }
    .diag-holder svg { width: 200px; height: auto; }

    /* ── BUTTONS ── */
    .btn-main { width: 100%; padding: 18px; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 500; background: var(--accent); color: #FFF; border: none; border-radius: 16px; cursor: pointer; transition: opacity .15s ease, visibility 0s .15s, transform .1s; margin-bottom: 12px; box-shadow: 0 4px 14px rgba(184,92,42,.22); display: flex; align-items: center; justify-content: center; gap: 8px; visibility: visible; }
    .btn-main.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    /* Stack reveal-btn + ok/ko-row dans la même cellule grid : hauteur stable, pas de saut */
    .actions-stack { width: 100%; display: grid; grid-template-areas: 'a'; }
    .actions-stack > .btn-main { grid-area: a; margin-bottom: 0; }
    .actions-stack > .btn-row  { grid-area: a; margin-bottom: 0; align-self: stretch; }
    .btn-main:hover { opacity: .84; }
    .btn-main:active { transform: scale(.985); }
    .btn-row { width: 100%; display: flex; gap: 12px; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
    .btn-row.vis { opacity: 1; pointer-events: all; }
    .btn-ok, .btn-ko { flex: 1; padding: 17px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; border: none; border-radius: 16px; cursor: pointer; transition: opacity .12s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-ok { background: var(--correct); color: #FFF; }
    .btn-ko { background: var(--wrong); color: #FFF; }
    .btn-ok:hover, .btn-ko:hover { opacity: .84; }
    .btn-ok:active, .btn-ko:active { transform: scale(.985); }

    /* ── HOME ── */
    .home { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 14px; }
    .home-icon { font-size: 36px; margin-bottom: 6px; }
    .home-h1 { font-family: 'Playfair Display', serif; font-size: 32px; line-height: 1.15; letter-spacing: -1.2px; text-align: center; margin-bottom: 4px; }
    .home-h1 em { color: var(--accent); font-style: italic; }
    .home-sub { font-size: 12px; color: var(--muted); text-align: center; font-weight: 300; line-height: 1.6; margin-bottom: 18px; }
    .mode-cards { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .mode-card { background: var(--card); border-radius: 18px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.06); cursor: pointer; transition: box-shadow .15s, transform .12s; }
    .mode-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.10); transform: translateY(-1px); }
    .mode-card:active { transform: scale(.988); }
    .mode-card.ess  { border-left: 4px solid var(--mode-ess); }
    .mode-card.comp { border-left: 4px solid var(--mode-comp); }
    .mode-card.all  { border-left: 4px solid var(--mode-all); }
    .mode-icon-box { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .mode-icon-box.ess  { background: var(--mode-ess-bg); }
    .mode-icon-box.comp { background: var(--mode-comp-bg); }
    .mode-icon-box.all  { background: var(--mode-all-bg); }
    .mode-info { flex: 1; min-width: 0; }
    .mode-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
    .mode-desc { font-size: 12px; color: var(--muted); font-weight: 300; line-height: 1.4; }
    .mode-prog-row { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .mode-prog-fill.ess  { height: 100%; border-radius: 2px; background: var(--mode-ess); }
    .mode-prog-fill.comp { height: 100%; border-radius: 2px; background: var(--mode-comp); }
    .mode-prog-fill.all  { height: 100%; border-radius: 2px; background: var(--mode-all); }
    .mode-stat { text-align: right; flex-shrink: 0; }
    .mode-stat-n { font-family: 'Playfair Display', serif; font-size: 22px; display: block; line-height: 1; margin-bottom: 2px; }
    .mode-stat-n.ess  { color: var(--mode-ess); }
    .mode-stat-n.comp { color: var(--mode-comp); }
    .mode-stat-n.all  { color: var(--mode-all); }
    .mode-stat-l { font-size: 10px; color: var(--muted); }
    .home-links { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 4px; }
    .home-action-btn { width: 100%; display: flex; align-items: center; gap: 12px; background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 18px; cursor: pointer; font-family: 'Outfit', sans-serif; transition: border-color .15s, box-shadow .15s, transform .1s; text-align: left; }
    .home-action-btn:hover { border-color: var(--accent); box-shadow: 0 3px 14px rgba(184,92,42,.12); transform: translateY(-1px); }
    .home-action-btn:active { transform: scale(.988); }
    .hab-icon { font-size: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .hab-icon svg { width: 22px; height: 22px; color: var(--accent); }
    .hab-text { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
    .hab-arrow { flex-shrink: 0; display: inline-flex; align-items: center; color: var(--muted); transition: transform .15s, color .15s; }
    .hab-arrow svg { width: 18px; height: 18px; }
    .home-action-btn:hover .hab-arrow { transform: translateX(3px); color: var(--accent); }
    .home-data-bar { width: 100%; display: flex; gap: 8px; margin-top: 10px; }
    .btn-data { flex: 1; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 10px; cursor: pointer; transition: border-color .15s, color .15s, background .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-data:hover { border-color: var(--accent); background: var(--accent-light); }
    .streak-home { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; font-weight: 500; margin-top: -6px; margin-bottom: 16px; }
    .streak-home.active { color: var(--accent); }
    .streak-home.cold { color: var(--muted); font-weight: 300; }
    .end-streak-card { width: 100%; background: var(--accent-light); border-radius: 14px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; border-left: 3px solid var(--accent); }
    .end-streak-left { display: flex; align-items: center; gap: 10px; }
    .end-streak-flame { font-size: 26px; line-height: 1; }
    .end-streak-count { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--accent); line-height: 1; }
    .end-streak-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .end-streak-best { text-align: right; font-size: 11px; color: var(--muted); line-height: 1.5; }
    .end-streak-best strong { display: block; font-size: 15px; font-weight: 600; color: var(--text); }

    /* ── SUB-MODES ── */
    .sub-screen { width: 100%; }
    .sub-top { display: flex; align-items: center; gap: 14px; padding: 18px 0 14px; }
    .sub-h { font-family: 'Playfair Display', serif; font-size: 21px; }
    .sub-intro { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.6; margin-bottom: 18px; }
    .sub-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .sub-card { background: var(--card); border-radius: 16px; padding: 16px 16px 14px; display: flex; flex-direction: column; gap: 7px; box-shadow: 0 1px 6px rgba(0,0,0,.05); cursor: pointer; border-left: 4px solid #ccc; transition: box-shadow .15s, transform .12s; }
    .sub-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-1px); }
    .sub-card:active { transform: scale(.96); }
    .sub-card-head { display: flex; align-items: center; gap: 8px; }
    .sub-card-icon { font-size: 18px; line-height: 1; }
    .sub-card-name { font-weight: 600; font-size: 14px; }
    .sub-card-desc { font-size: 11px; color: var(--muted); font-weight: 300; line-height: 1.5; }
    .sub-prog-row { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .sub-prog-fill { height: 100%; border-radius: 2px; }
    .sub-stat { font-size: 11px; color: var(--muted); }

    /* ── END ── */
    .end-screen { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 24px; }
    .end-badge { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; margin-bottom: 28px; }
    .end-score-wrap { text-align: center; margin-bottom: 32px; }
    .end-emoji { font-size: 52px; margin-bottom: 12px; display: block; }
    .end-score { font-family: 'Playfair Display', serif; font-size: 68px; line-height: 1; letter-spacing: -2px; }
    .end-score span { font-size: 32px; color: var(--muted); letter-spacing: 0; }
    .end-label { font-size: 14px; color: var(--muted); margin-top: 6px; }
    .end-mastery-card { width: 100%; background: var(--card); border-radius: 18px; padding: 20px 22px; margin-bottom: 24px; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
    .end-mastery-title { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .end-mastery-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .end-m-val { font-family: 'Playfair Display', serif; font-size: 30px; white-space: nowrap; }
    .end-m-val .slash { font-size: 18px; color: var(--muted); }
    .end-m-delta { font-size: 13px; font-weight: 500; margin-top: 10px; }
    .end-m-delta.up   { color: var(--correct); }
    .end-m-delta.same { color: var(--muted); }
    .end-track { flex: 1; }
    .end-prog-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .end-prog-fill { height: 100%; border-radius: 3px; transition: width .8s ease; }
    .end-prog-pct { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }
    .end-btn-row { width: 100%; display: flex; gap: 12px; }
    .btn-replay { flex: 1; padding: 17px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; border: none; border-radius: 16px; cursor: pointer; transition: opacity .12s; color: #FFF; }
    .btn-replay:hover { opacity: .84; }
    .btn-home-end { flex: 1; padding: 17px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500; border: 1.5px solid var(--border); border-radius: 16px; cursor: pointer; background: var(--card); color: var(--text); transition: background .12s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-home-end svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn-home-end:hover { background: var(--border); }

    /* ── REFERENCE ── */
    .ref-screen { width: 100%; }
    .ref-top { display: flex; align-items: center; gap: 14px; padding: 18px 0 14px; }
    /* ── BOUTONS PILULES (Retour / Accueil) ── */
    .btn-nav-back {
      display: inline-flex; align-items: center; gap: 7px;
      height: 44px; padding: 0 16px 0 12px;
      background: var(--card); border: 1.5px solid var(--border); border-radius: 22px;
      cursor: pointer; flex-shrink: 0;
      font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; color: var(--text);
      transition: background .12s, border-color .12s, color .12s, transform .1s;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-nav-back:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .btn-nav-back:active { transform: scale(.96); }
    .btn-nav-back svg { width: 20px; height: 20px; flex-shrink: 0; }
    .nav-label { line-height: 1; }
    @media (max-width: 360px) {
      .btn-nav-back .nav-label { display: none; }
      .btn-nav-back { width: 44px; padding: 0; justify-content: center; border-radius: 50%; }
    }

    /* ── SVG SIZING dans les boutons existants ── */
    .btn-ghost { display: inline-flex; align-items: center; gap: 5px; }
    .btn-ghost svg { width: 14px; height: 14px; }
    .btn-data svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--accent); }
    .btn-main { gap: 8px; }
    .btn-main svg { width: 18px; height: 18px; flex-shrink: 0; }
    .btn-replay { display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-replay svg { width: 16px; height: 16px; flex-shrink: 0; }
    .hab-arrow svg { color: inherit; }
    .btn-nav:not(:disabled):active { transform: scale(.97); }

    /* ── MODE PREVIEW ── */
    .preview-screen { width: 100%; }
    .preview-top { display: flex; align-items: center; gap: 14px; padding: 18px 0 12px; }
    .preview-h { font-family: 'Playfair Display', serif; font-size: 21px; line-height: 1.2; }
    .preview-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; font-weight: 300; line-height: 1.5; }
    .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 22px; }
    .preview-item { background: var(--card); border-radius: 14px; padding: 12px 6px 10px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 1px 6px rgba(0,0,0,.05); cursor: pointer; transition: box-shadow .14s, transform .1s; -webkit-tap-highlight-color: transparent; }
    .preview-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-1px); }
    .preview-item:active { transform: scale(.94); }
    .preview-item svg { width: 72px; height: auto; }
    .preview-name { font-family: 'Playfair Display', serif; font-size: 13px; margin-top: 5px; text-align: center; line-height: 1.3; }
    .btn-start-preview { width: 100%; padding: 18px; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; color: #FFF; border: none; border-radius: 16px; cursor: pointer; transition: opacity .12s, transform .1s; margin-bottom: 10px; box-shadow: 0 5px 20px rgba(0,0,0,.14); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-start-preview svg { width: 20px; height: 20px; color: #FFF; flex-shrink: 0; }
    .btn-start-preview:hover { opacity: .88; }
    .btn-start-preview:active { transform: scale(.985); }
    .ref-h { font-family: 'Playfair Display', serif; font-size: 21px; }
    .sort-bar { width: 100%; display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .sort-btn { font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; padding: 7px 13px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: all .14s; white-space: nowrap; }
    .sort-btn.active { background: var(--text); color: #FFF; border-color: var(--text); }
    .ref-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .ref-item { background: var(--card); border-radius: 14px; padding: 12px 6px 10px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 1px 6px rgba(0,0,0,.05); cursor: pointer; transition: box-shadow .14s, transform .1s; }
    .ref-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-1px); }
    .ref-item:active { transform: scale(.94); }
    .ref-item svg { width: 72px; height: auto; }
    .ref-name { font-family: 'Playfair Display', serif; font-size: 13px; margin-top: 5px; text-align: center; }
    .ref-bar { width: 80%; height: 3px; background: var(--border); border-radius: 2px; margin-top: 7px; overflow: hidden; }
    .ref-fill { height: 100%; border-radius: 2px; }
    .ref-pct { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .ref-footer { margin-top: 24px; text-align: center; }
    .btn-reset { background: none; border: none; font-family: 'Outfit', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; padding: 8px; text-decoration: underline; text-decoration-color: var(--border); }
    .btn-reset:hover { color: var(--wrong); }

    /* ── CUSTOM SELECT ── */
    .sel-screen { width: 100%; }
    .sel-top { display: flex; align-items: center; gap: 14px; padding: 18px 0 10px; }
    .sel-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .sel-count { font-size: 13px; font-weight: 600; }
    .sel-count.ok   { color: var(--correct); }
    .sel-count.warn { color: var(--accent); }
    .sel-count.bad  { color: var(--muted); }
    .sel-actions { display: flex; gap: 10px; }
    .btn-sel-link { background: none; border: none; font-family: 'Outfit', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; padding: 4px 8px; text-decoration: underline; text-decoration-color: var(--border); border-radius: 6px; }
    .btn-sel-link:hover { color: var(--text); }
    .sel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .sel-item { background: var(--card); border-radius: 14px; padding: 10px 4px 8px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 1px 6px rgba(0,0,0,.05); cursor: pointer; border: 2.5px solid transparent; transition: border-color .12s, background .12s, transform .08s; position: relative; user-select: none; -webkit-tap-highlight-color: transparent; }
    .sel-item:active { transform: scale(.94); }
    .sel-item.selected { border-color: var(--accent); background: var(--accent-light); }
    .sel-item svg { width: 60px; height: auto; }
    .sel-item-name { font-family: 'Playfair Display', serif; font-size: 12px; margin-top: 4px; text-align: center; line-height: 1.3; }
    .sel-check { position: absolute; top: 5px; right: 5px; width: 17px; height: 17px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #fff; opacity: 0; transform: scale(.5); transition: opacity .14s, transform .14s; }
    .sel-item.selected .sel-check { opacity: 1; transform: scale(1); }
    .btn-start-custom { width: 100%; padding: 18px; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; background: var(--accent); color: #FFF; border: none; border-radius: 16px; cursor: pointer; transition: opacity .12s, transform .1s; box-shadow: 0 5px 20px rgba(184,92,42,.28); margin-bottom: 10px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-start-custom svg { width: 18px; height: 18px; flex-shrink: 0; }
    .btn-start-custom:disabled { background: var(--border); color: var(--muted); box-shadow: none; cursor: not-allowed; }
    .btn-start-custom:not([disabled]):hover { opacity: .88; }
    .btn-start-custom:not([disabled]):active { transform: scale(.985); }
    .custom-sandbox-note { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6; margin-bottom: 4px; }
    .end-sandbox-card { width: 100%; background: var(--accent-light); border-radius: 18px; padding: 18px 22px; margin-bottom: 24px; border-left: 4px solid var(--accent); }
    .end-sandbox-title { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .end-sandbox-body { font-size: 13px; color: var(--text); line-height: 1.6; font-weight: 300; }

    /* ── CHORD DETAIL ── */
    .detail-screen { width: 100%; display: flex; flex-direction: column; align-items: center; }
    .detail-top { width: 100%; display: flex; align-items: center; gap: 14px; padding: 18px 0 10px; }
    .detail-counter { font-size: 12px; color: var(--muted); margin-left: auto; }
    /* Stack chord-detail : grid stacking, les 2 cartes restent dans le flow */
    .detail-card-stack { display: grid; grid-template-areas: 'card'; width: 100%; margin-bottom: 16px; }
    .detail-card-stack > .detail-card { grid-area: card; align-self: start; margin-bottom: 0; }
    .detail-card { width: 100%; background: var(--card); border-radius: 22px; box-shadow: 0 2px 10px rgba(0,0,0,.06), 0 8px 28px rgba(0,0,0,.07); display: flex; flex-direction: column; align-items: center; padding: 28px 24px 24px; touch-action: pan-y; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
    .detail-card.behind     { transform: scale(.92); opacity: .55; z-index: 1; }
    .detail-card.front-anim { z-index: 2; transform-origin: 50% 110%; }
    .fly-out-left  { animation: flyOutLeft  .45s cubic-bezier(.45,.05,.55,.95) forwards; }
    .fly-out-right { animation: flyOutRight .45s cubic-bezier(.45,.05,.55,.95) forwards; }
    .coming-in     { animation: comeIn      .45s cubic-bezier(.4,.1,.4,1)       forwards; }
    @keyframes flyOutLeft  { to   { transform: translateX(-130%) rotate(-16deg); opacity: 0; } }
    @keyframes flyOutRight { to   { transform: translateX( 130%) rotate( 16deg); opacity: 0; } }
    @keyframes comeIn      { from { transform: scale(.92); opacity: .55; } to { transform: scale(1); opacity: 1; } }
    .detail-name { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1; letter-spacing: -2px; margin-bottom: 20px; }
    .detail-diag svg { width: 190px; height: auto; }
    .detail-prog-row { width: 80%; display: flex; flex-direction: column; align-items: center; gap: 5px; margin-top: 22px; }
    .detail-bar { width: 100%; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .detail-fill { height: 100%; border-radius: 3px; }
    .detail-pct { font-size: 11px; color: var(--muted); }
    .detail-legend { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; font-size: 11px; color: var(--muted); }
    .detail-legend span { display: flex; align-items: center; gap: 4px; }
    .det-dot { width: 16px; height: 16px; background: #1C1C1C; border-radius: 50%; color: white; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; flex-shrink: 0; }
    .detail-nav { width: 100%; display: flex; gap: 10px; }
    .btn-nav { flex: 1; padding: 15px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; border: 1.5px solid var(--border); border-radius: 14px; cursor: pointer; background: var(--card); color: var(--text); transition: background .12s, border-color .12s, opacity .12s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-nav-ic { display: flex; align-items: center; flex-shrink: 0; color: var(--accent); transition: transform .15s, color .15s; }
    .btn-nav-ic svg { width: 20px; height: 20px; }
    .btn-nav:hover:not(:disabled) { border-color: var(--accent); }
    .btn-nav:hover:not(:disabled) .btn-nav-ic.prev { transform: translateX(-3px); }
    .btn-nav:hover:not(:disabled) .btn-nav-ic.next { transform: translateX(3px); }
    .btn-nav:disabled { opacity: .3; cursor: not-allowed; }
    .btn-nav:disabled .btn-nav-ic { color: var(--muted); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fadein { animation: fadeUp .32s ease forwards; }
    @keyframes popIn { from { opacity: 0; transform: scale(.88); } to { opacity: 1; transform: scale(1); } }
    .popin { animation: popIn .4s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* ── RESPONSIVE ── */
    @media (min-width: 400px) {
      .card-body { height: 450px; }
      .chord-big { font-size: 130px; }
      .chord-big.md { font-size: 105px; }
      .chord-big.sm { font-size: 80px; }
      .face-tag { font-size: 25px; }
      .diag-holder svg { width: 220px; }
    }
    @media (max-width: 340px) {
      .card-body { height: 360px; }
      .chord-big { font-size: 100px; }
      .chord-big.md { font-size: 80px; }
      .chord-big.sm { font-size: 60px; }
      .face-tag { font-size: 18px; }
      .diag-holder svg { width: 175px; }
      .ref-grid { grid-template-columns: repeat(2, 1fr); }
      .sub-grid { grid-template-columns: 1fr; }
    }
    /* ════════ ONBOARDING (premier lancement) ════════ */
    .ob-overlay{position:fixed;inset:0;background:rgba(28,28,28,.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:10001;animation:fadeUp .3s ease;padding:18px;}
    .ob-card{background:var(--card);border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,.28);padding:24px 22px 20px;max-width:380px;width:100%;max-height:92vh;overflow-y:auto;animation:popIn .42s cubic-bezier(.34,1.56,.64,1);}
    .ob-kicker{font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);text-align:center;margin-bottom:6px;}
    .ob-title{font-family:'Playfair Display',serif;font-size:25px;line-height:1.15;letter-spacing:-.5px;text-align:center;margin-bottom:6px;}
    .ob-sub{font-size:13px;color:var(--muted);font-weight:300;line-height:1.5;text-align:center;margin-bottom:16px;}
    .ob-tabs{display:flex;gap:6px;margin-bottom:16px;}
    .ob-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border:1.5px solid var(--border);border-radius:13px;background:var(--card);cursor:pointer;font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;color:var(--muted);transition:border-color .14s,background .14s,color .14s;-webkit-tap-highlight-color:transparent;}
    .ob-tab .ob-tab-ic{font-size:18px;line-height:1;}
    .ob-tab.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
    .ob-step{display:flex;gap:13px;align-items:flex-start;margin-bottom:14px;}
    .ob-step-n{flex-shrink:0;width:27px;height:27px;border-radius:50%;background:var(--accent);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;}
    .ob-step-tt{font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;margin-bottom:2px;}
    .ob-step-bd{font-size:12.5px;color:var(--muted);font-weight:300;line-height:1.45;}
    .ob-native{width:100%;padding:14px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:13px;cursor:pointer;margin:2px 0 14px;box-shadow:0 4px 16px rgba(184,92,42,.3);}
    .ob-qr-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--bg);border-radius:16px;padding:16px;margin:6px 0 4px;}
    .ob-qr{width:158px;height:158px;background:#fff;border-radius:10px;padding:8px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
    .ob-qr svg{width:100%;height:100%;display:block;}
    .ob-qr-cap{font-size:12px;color:var(--muted);text-align:center;font-weight:300;line-height:1.4;}
    .ob-actions{display:flex;gap:10px;margin-top:8px;}
    .ob-btn-primary{flex:2;padding:15px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:14px;cursor:pointer;transition:opacity .12s,transform .1s;box-shadow:0 4px 16px rgba(184,92,42,.3);}
    .ob-btn-primary:active{transform:scale(.985);}
    .ob-btn-ghost{flex:1;padding:15px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;background:var(--card);color:var(--muted);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;}
    .ob-tour-spot{position:fixed;border-radius:16px;box-shadow:0 0 0 9999px rgba(28,28,28,.62);border:2.5px solid var(--accent);z-index:10002;pointer-events:none;transition:top .2s ease,left .2s ease,width .2s ease,height .2s ease;}
    .ob-tour-tip{position:fixed;z-index:10003;background:var(--card);border-radius:18px;box-shadow:0 8px 36px rgba(0,0,0,.3);padding:18px 18px 16px;width:290px;max-width:calc(100vw - 28px);animation:popIn .32s cubic-bezier(.34,1.56,.64,1);}
    .ob-tip-count{font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--accent);margin-bottom:5px;}
    .ob-tip-title{font-family:'Playfair Display',serif;font-size:19px;margin-bottom:5px;letter-spacing:-.3px;}
    .ob-tip-body{font-size:13px;color:var(--muted);font-weight:300;line-height:1.5;margin-bottom:14px;}
    .ob-tip-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .ob-tip-skip{background:none;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;padding:6px;}
    .ob-tip-next{padding:11px 20px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:12px;cursor:pointer;}
    .ob-help-btn{width:100%;margin-top:10px;padding:12px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;background:transparent;color:var(--muted);border:1.5px dashed var(--border);border-radius:13px;cursor:pointer;transition:border-color .14s,color .14s;-webkit-tap-highlight-color:transparent;}
    .ob-help-btn:hover{border-color:var(--accent);color:var(--accent);}
    /* ════════ SPLASH (lancement) ════════ */
    #appSplash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:99999;transition:opacity .5s ease;}
    #appSplash img{width:132px;height:132px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.12));animation:splashPop .5s cubic-bezier(.34,1.56,.64,1);}
    #appSplash .splash-title{font-family:'Playfair Display',serif;font-size:30px;line-height:1.15;text-align:center;letter-spacing:-1px;color:var(--text);}
    #appSplash .splash-title em{color:var(--accent);font-style:italic;}
    #appSplash.splash-hide{opacity:0;pointer-events:none;}
    @keyframes splashPop{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:scale(1)}}
      /* ════════ RECO ACCORDS AU MICRO (beta) ════════ */
    .cr-screen{width:100%;text-align:center;}
    .cr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .cr-badge-beta{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;background:var(--accent);border-radius:8px;padding:3px 8px;}
    .cr-target{font-family:'Playfair Display',serif;font-size:60px;line-height:1;color:var(--text);margin:4px 0;transition:color .15s;}
    .cr-target.ok{color:var(--correct);}
    .cr-notes{font-family:'Outfit',sans-serif;font-size:12px;color:var(--muted);margin-bottom:4px;}
    .cr-verdict{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;min-height:22px;margin:4px 0;}
    .cr-verdict.ok{color:var(--correct);}
    .cr-verdict.no{color:var(--muted);}
    .cr-score{font-family:'Outfit',sans-serif;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;min-height:16px;}
    .cr-bars{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:110px;margin:12px 0;}
    .cr-bar{flex:1;max-width:24px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
    .cr-bar-fill{width:100%;background:var(--border);border-radius:3px 3px 0 0;transition:height .08s linear;min-height:2px;}
    .cr-bar.tgt .cr-bar-fill{background:var(--accent);}
    .cr-bar.ok .cr-bar-fill{background:var(--correct);}
    .cr-bar.bad .cr-bar-fill{background:#C04848;}
    .cr-bar-lbl{font-family:'Outfit',sans-serif;font-size:9px;color:var(--muted);margin-top:3px;}
    .cr-bar.tgt .cr-bar-lbl{color:var(--accent);font-weight:700;}
    .cr-actions{display:flex;gap:10px;margin-top:6px;}
    .cr-btn{flex:1;padding:13px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;border-radius:13px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text);-webkit-tap-highlight-color:transparent;}
    .cr-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
    .cr-hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.4;}
    /* toggle reco en session (prêt pour l'intégration) */
    .recog-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:2px 0 8px;}
    .recog-label{font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;}
    .recog-beta{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#fff;background:var(--accent);border-radius:6px;padding:2px 5px;}
    .recog-switch{position:relative;width:44px;height:24px;border-radius:13px;border:none;background:var(--border);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;padding:0;flex:none;}
    .recog-switch.on{background:var(--accent);}
    .recog-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
    .recog-switch.on .recog-knob{left:22px;}
    .recog-hint{text-align:center;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--muted);min-height:38px;margin:2px 0 10px;line-height:1.3;display:flex;align-items:center;justify-content:center;}
    .recog-hint.ok{color:var(--correct);font-weight:600;}
    .recog-diag-note{text-align:center;color:#fff;background:#C0392B;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;line-height:1.35;margin:2px 0 12px;padding:12px 14px;border-radius:14px;box-shadow:0 4px 16px rgba(192,57,43,.35);overflow:hidden;max-height:160px;transition:opacity .35s ease,max-height .5s ease,margin .5s ease,padding .5s ease,box-shadow .35s ease;}
    .recog-diag-note.hide{opacity:0;max-height:0;margin-top:0;margin-bottom:0;padding-top:0;padding-bottom:0;box-shadow:none;}
    @keyframes softBlink{0%,100%{opacity:1}50%{opacity:.38}}
    .face-tag.blink-smooth{animation:softBlink 1.3s ease-in-out infinite;}
    .recog-perm-overlay{position:fixed;inset:0;background:rgba(28,28,28,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:10050;padding:18px;}
    .recog-perm-panel{background:var(--card);border-radius:22px;box-shadow:0 8px 44px rgba(0,0,0,.3);padding:24px 22px;max-width:380px;width:100%;text-align:left;}
    .recog-perm-title{font-family:'Outfit',sans-serif;font-weight:600;font-size:16px;margin-bottom:4px;text-align:center;}
    .recog-perm-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;}
    .recog-steps{margin:0 0 8px;padding-left:20px;}
    .recog-steps li{font-size:13px;line-height:1.5;color:var(--text);margin-bottom:8px;}
    .recog-steps li b{color:var(--accent);}
    .recog-perm-note{font-size:12px;color:var(--muted);line-height:1.45;margin:0 0 10px;font-style:italic;}
    .recog-perm-btn{width:100%;padding:14px;margin-top:6px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:13px;cursor:pointer;}

    @keyframes btnAttn{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
    .btn-ok.attn,.btn-ko.attn{animation:btnAttn .9s ease-in-out infinite;box-shadow:0 0 0 3px rgba(0,0,0,.06);}
</style>

/* ════════════════════════════════════════════════════════════
   AUDIO — Web Audio API
════════════════════════════════════════════════════════════ */
var _ctx = null;
function ctx() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  return _ctx;
}
function tone(freq, dur, vol, type, delay) {
  try {
    var c = ctx(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type || 'sine'; o.frequency.value = freq;
    var t = c.currentTime + (delay || 0);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol || 0.18, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  } catch(e){}
}
function playSuccess(streak) {
  var boost = Math.min(streak, 5) * 20;
  tone(440 + boost, 0.12, 0.15, 'sine');
  tone(554 + boost, 0.12, 0.13, 'sine', 0.1);
  tone(659 + boost, 0.22, 0.13, 'sine', 0.2);
}
function playFail() {
  tone(220, 0.08, 0.12, 'sawtooth');
  tone(196, 0.22, 0.10, 'sawtooth', 0.08);
}
function playVictory() {
  var c = ctx();
  if (!c) return;
  var now = c.currentTime;
  // Arpège rapide C4 → E4 → G4 → C5
  var arp = [[261.63, 0], [329.63, 0.07], [392.00, 0.14], [523.25, 0.21]];
  arp.forEach(function(p) {
    var o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'triangle';
    o.frequency.value = p[0];
    var t = now + p[1];
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
    o.start(t); o.stop(t + 0.30);
  });
  // Accord final tenu C5 + E5 + G5 + C6
  var chord = [[523.25, 0.16], [659.25, 0.13], [784.00, 0.10], [1046.50, 0.07]];
  chord.forEach(function(p) {
    var o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sine';
    o.frequency.value = p[0];
    var t = now + 0.30;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(p[1], t + 0.025);
    g.gain.setValueAtTime(p[1], t + 0.30);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.90);
    o.start(t); o.stop(t + 0.92);
  });
  // Scintille finale C6 + E6 (une octave au-dessus)
  [1046.50, 1318.51].forEach(function(freq, i) {
    var o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sine';
    o.frequency.value = freq;
    var t = now + 0.65 + i * 0.07;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.06, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
    o.start(t); o.stop(t + 0.36);
  });
}

/* ════════════════════════════════════════════════════════════
   DIAGRAMME SVG GUITARE
   6 cordes EADGBE, 4 frettes
   Gère : X/O markers, sillet, barrés (ovale), points individuels,
          offset de frette (baseFret > 1, label "Nfr")
════════════════════════════════════════════════════════════ */
function drawDiagram(chord, size) {
  var frets    = chord.frets;
  var baseFret = chord.baseFret || 1;
  var barre    = chord.barre || null;
  var fingers  = chord.fingers || null;
  var sm       = (size === 'sm');

  // ── Dimensions — format portrait (ratio ~0.76) ───────────
  var W    = sm ? 80  : 130;
  var H    = sm ? 105 : 170;
  var pL   = sm ? 11  : 18;   // symétrique → grille centrée
  var pR   = sm ? 11  : 18;
  var pTop = sm ? 19  : 31;
  var nutH = sm ? 5   : 8;
  var pBot = sm ? 5   : 8;

  var nutY = pTop + nutH;
  var gW   = W - pL - pR;     // largeur zone cordes
  var gH   = H - nutY - pBot;
  var sw   = gW / 5;           // espacement inter-cordes (6c = 5 gaps)
  var fh   = gH / 4;           // hauteur d'une frette
  var r    = Math.min(sw, fh) * 0.44; // rayon des points
  var fnSz    = sm ? 7  : 10;  // taille police doigtés dans les points
  var fnSzBar = sm ? 8  : 12;  // taille police "1" dans l'ovale (légèrement plus grand)

  var sw_str  = sm ? 0.9 : 1.2;
  var sw_fret = sm ? 0.6 : 0.8;
  var sw_mk   = sm ? 1.3 : 1.7;
  var mR      = sm ? 2.5 : 3.7;  // rayon marker O
  var xSz     = sm ? 2.5 : 3.7;  // demi-taille marker X
  var mY      = pTop - (sm ? 5.5 : 8);

  var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';

  // ── Marqueurs au-dessus du sillet : × (étouffé) et ○ (à vide) ──
  for (var i = 0; i < 6; i++) {
    var xi = pL + i * sw;
    if (frets[i] === 0) {
      s += '<circle cx="'+xi.toFixed(1)+'" cy="'+mY.toFixed(1)+'" r="'+mR+'" fill="none" stroke="#1C1C1C" stroke-width="'+sw_mk+'"/>';
    } else if (frets[i] === -1) {
      s += '<line x1="'+(xi-xSz).toFixed(1)+'" y1="'+(mY-xSz).toFixed(1)+'" x2="'+(xi+xSz).toFixed(1)+'" y2="'+(mY+xSz).toFixed(1)+'" stroke="#1C1C1C" stroke-width="'+sw_mk+'" stroke-linecap="round"/>';
      s += '<line x1="'+(xi+xSz).toFixed(1)+'" y1="'+(mY-xSz).toFixed(1)+'" x2="'+(xi-xSz).toFixed(1)+'" y2="'+(mY+xSz).toFixed(1)+'" stroke="#1C1C1C" stroke-width="'+sw_mk+'" stroke-linecap="round"/>';
    }
  }

  // ── Sillet ou indicateur de frette ───────────────────────
  if (baseFret === 1) {
    // Sillet épais
    s += '<rect x="'+(pL-1.5).toFixed(1)+'" y="'+pTop.toFixed(1)+'" width="'+(gW+3).toFixed(1)+'" height="'+nutH+'" fill="#1C1C1C" rx="1"/>';
  } else {
    // Ligne fine (pas de sillet)
    s += '<line x1="'+pL.toFixed(1)+'" y1="'+pTop.toFixed(1)+'" x2="'+(pL+gW).toFixed(1)+'" y2="'+pTop.toFixed(1)+'" stroke="#1C1C1C" stroke-width="'+(sm?1.0:1.4)+'"/>';
    // Label "Nfr" à droite
    var lx = (pL + gW + (sm?3:4)).toFixed(1);
    var ly = (pTop + fh * 0.65).toFixed(1);
    s += '<text x="'+lx+'" y="'+ly+'" font-family="Outfit,sans-serif" font-size="'+(sm?7.5:10)+'" fill="#8C8880">'+baseFret+'fr</text>';
  }

  // ── Cordes verticales ─────────────────────────────────────
  for (var i = 0; i < 6; i++) {
    var xi2 = (pL + i * sw).toFixed(1);
    s += '<line x1="'+xi2+'" y1="'+nutY.toFixed(1)+'" x2="'+xi2+'" y2="'+(nutY+gH).toFixed(1)+'" stroke="#1C1C1C" stroke-width="'+sw_str+'"/>';
  }

  // ── Lignes de frettes horizontales ───────────────────────
  for (var f = 1; f <= 4; f++) {
    var yf = (nutY + f * fh).toFixed(1);
    s += '<line x1="'+pL.toFixed(1)+'" y1="'+yf+'" x2="'+(pL+gW).toFixed(1)+'" y2="'+yf+'" stroke="#1C1C1C" stroke-width="'+sw_fret+'"/>';
  }

  // ── Ovale de barré ────────────────────────────────────────
  if (barre) {
    var barreRow = barre.fret - baseFret + 1;
    var barreY   = nutY + (barreRow - 0.5) * fh;
    var bx1      = pL + barre.fromStr * sw;
    var bx2      = pL + barre.toStr  * sw;
    var bH       = r * 0.95;
    s += '<rect x="'+(bx1 - r*1.3).toFixed(1)+'" y="'+(barreY - bH).toFixed(1)+'" width="'+(bx2 - bx1 + r*2.6).toFixed(1)+'" height="'+(bH*2).toFixed(1)+'" rx="'+bH.toFixed(1)+'" fill="#1C1C1C"/>';
    s += '<text x="'+((bx1+bx2)/2).toFixed(1)+'" y="'+barreY.toFixed(1)+'" font-family="Outfit,sans-serif" font-size="'+fnSzBar+'" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">1</text>';
  }

  // ── Points individuels (doigts non couverts par le barré) ─
  for (var i = 0; i < 6; i++) {
    var f = frets[i];
    if (f <= 0) continue;
    // Sauter si couvert par le barré à la même frette
    if (barre && f === barre.fret && i >= barre.fromStr && i <= barre.toStr) continue;
    var row = f - baseFret + 1;
    if (row < 1 || row > 4) continue;
    var xd = (pL + i * sw).toFixed(1);
    var yd = (nutY + (row - 0.5) * fh).toFixed(1);
    s += '<circle cx="'+xd+'" cy="'+yd+'" r="'+r.toFixed(1)+'" fill="#1C1C1C"/>';
    var fn = fingers ? fingers[i] : null;
    if (fn !== null && fn !== undefined && fn !== 0) {
      s += '<text x="'+xd+'" y="'+yd+'" font-family="Outfit,sans-serif" font-size="'+fnSz+'" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">'+fn+'</text>';
    }
  }

  s += '</svg>';
  return s;
}

var STORAGE_KEY = 'gtr_flash_v1';
var DAY_MS      = 24 * 60 * 60 * 1000;

// Toutes les faces : chaque accord a une face "nom" et une face "diagramme"
var ALL_ITEMS = [];
CHORDS.forEach(function(c) {
  ALL_ITEMS.push({ key: c.id+'_name',    chordId: c.id, side: 'name'    });
  ALL_ITEMS.push({ key: c.id+'_diagram', chordId: c.id, side: 'diagram' });
});

var sr = loadSR();

function freshItem() { return { interval:1, ef:2.5, reps:0, due:0, lastReview:0 }; }

function loadSR() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var p = JSON.parse(raw);
      ALL_ITEMS.forEach(function(it) { if (!p.items[it.key]) p.items[it.key] = freshItem(); });
      return p;
    }
  } catch(e) {}
  var fresh = { items:{} };
  ALL_ITEMS.forEach(function(it) { fresh.items[it.key] = freshItem(); });
  return fresh;
}

function saveSR() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sr)); } catch(e){} }

/* ── STREAK ── */
var STREAK_KEY = 'gtr_streak_v1';
var GRACE_MS   = 36 * 60 * 60 * 1000;

function loadStreak() {
  try { var r = localStorage.getItem(STREAK_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { count:0, best:0, lastTs:0 };
}
function saveStreak(sk) { try { localStorage.setItem(STREAK_KEY, JSON.stringify(sk)); } catch(e){} }
function recordStreak() {
  var now = Date.now(), sk = loadStreak();
  var today = new Date().toDateString();
  var last  = sk.lastTs ? new Date(sk.lastTs).toDateString() : null;
  if (last === today) { /* déjà joué aujourd'hui */ }
  else if (sk.lastTs && (now - sk.lastTs) <= GRACE_MS) { sk.count++; }
  else { sk.count = 1; }
  sk.best   = Math.max(sk.best || 0, sk.count);
  sk.lastTs = now;
  saveStreak(sk);
  return sk;
}

function resetSR() {
  sr = { items:{} };
  ALL_ITEMS.forEach(function(it) { sr.items[it.key] = freshItem(); });
  saveSR();
}

function getModeItems(modeId) {
  if (modeId === 'custom') {
    var ids = app.customChordIds || [];
    return ALL_ITEMS.filter(function(it) { return ids.indexOf(it.chordId) !== -1; });
  }
  var mode = ALL_MODES[modeId];
  if (!mode) return ALL_ITEMS;
  var ids = mode.chordIds || CHORDS.map(function(c) { return c.id; });
  return ALL_ITEMS.filter(function(it) { return ids.indexOf(it.chordId) !== -1; });
}

function nextItem(modeId, recentIds) {
  var now    = Date.now();
  var recent = recentIds || [];
  var all    = getModeItems(modeId);

  // Filtre cascade : exclut les N derniers, relâche si pool vide
  var pool = all.filter(function(i) { return recent.indexOf(i.chordId) === -1; });
  if (!pool.length && recent.length > 0) {
    var lastOnly = recent[recent.length - 1];
    pool = all.filter(function(i) { return i.chordId !== lastOnly; });
  }
  if (!pool.length) pool = all;

  var overdue = pool.filter(function(i) { return (sr.items[i.key] || freshItem()).due <= now; });
  if (overdue.length > 0) return overdue[Math.floor(Math.random() * overdue.length)];

  pool.sort(function(a, b) { return (sr.items[a.key]||freshItem()).due - (sr.items[b.key]||freshItem()).due; });
  var band = Math.max(1, Math.ceil(pool.length / 3));
  var candidates = pool.slice(0, band);
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function recordAnswer(key, correct) {
  var now = Date.now();
  var d   = sr.items[key] || freshItem();
  if (correct) {
    var ni = (d.reps === 0) ? 1 : (d.reps === 1) ? 6 : Math.round(d.interval * d.ef);
    d.reps++;
    d.interval = ni;
  } else {
    d.reps     = 0;
    d.interval = 1;
    d.ef       = Math.max(1.3, (d.ef || 2.5) - 0.15);
  }
  d.due         = now + d.interval * DAY_MS;
  d.lastReview  = now;
  sr.items[key] = d;
  saveSR();
}

function itemMastery(d) {
  if (!d || d.reps === 0) return 0;
  var iv = (d.reps === 1) ? 4 : (d.interval || 1);
  return Math.min(Math.sqrt(Math.max(iv - 1, 0) / 88), 1);
}

function chordMastery(id) {
  return (itemMastery(sr.items[id+'_name']) + itemMastery(sr.items[id+'_diagram'])) / 2;
}

function getModeStats(modeId) {
  var items = getModeItems(modeId);
  var totalM = 0, mastered = 0;
  items.forEach(function(it) {
    var m = itemMastery(sr.items[it.key]);
    totalM += m;
    if ((sr.items[it.key] || freshItem()).reps >= 3) mastered++;
  });
  var pct = items.length > 0 ? Math.round(mastered / items.length * 100) : 0;
  return { mastered: mastered, total: items.length, pct: pct };
}

function byId(id) { return CHORDS.find(function(c) { return c.id === id; }); }
function sizeClass(n) { return n.length >= 5 ? 'sm' : n.length >= 4 ? 'md' : ''; }
/* ── Nom français d'un symbole d'accord (porté de l'ukulélé). Non affiché pour l'instant ; sert au Chantier 3 (reco/voix). ── */
function chordFr(name){
  var m=name.match(/^([A-G])([#b]?)(.*)$/); if(!m) return name;
  var root={C:'Do',D:'Ré',E:'Mi',F:'Fa',G:'Sol',A:'La',B:'Si'}[m[1]];
  var acc=m[2]==='#'?' dièse':m[2]==='b'?' bémol':'';
  var suf={'':' Majeur','m':' mineur','7':' 7','m7':' mineur 7','maj7':' Majeur 7','sus2':' sus2','sus4':' sus4','add9':' add9'}[m[3]];
  if(suf===undefined) suf=' '+m[3];
  return root+acc+suf;
}

function sessionEmoji(correct, total) {
  total = total || 10;
  if (total === 0) return '🎯';
  var pct = correct / total;
  if (pct === 1 && total >= 5) return '🥇';  // perfect : seuil min 5 questions
  if (pct >= 0.9)              return '🏆';
  if (pct >= 0.7)              return '⭐';
  if (pct >= 0.5)              return '👍';
  if (pct >= 0.3)              return '💪';
  return '🎯';
}
function sessionMsg(correct, total) {
  total = total || 10;
  if (total === 0) return 'Session vide';
  var pct = correct / total;
  if (pct === 1 && total >= 5) return 'Série Parfaite !';
  if (pct >= 0.9)              return 'Excellent !';
  if (pct >= 0.7)              return 'Très bien !';
  if (pct >= 0.5)              return "On s'accroche !";
  if (pct >= 0.3)              return 'Continue !';
  return 'On y retourne !';
}

// Helper : detecte si on est dans une session libre (sandbox) en cours
function isInFreeSession() {
  return app.screen === 'session'
      && ALL_MODES[app.modeId] && ALL_MODES[app.modeId].sandboxCorrect
      && app.session && app.session.total > 0;
}

function exportProgress() {
  var d   = new Date();
  var ds  = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var data = { app:'guitare', v:1, date:d.toISOString(), items:sr.items };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'progression-guitare-'+ds+'.json'; a.click();
  URL.revokeObjectURL(url);
}

function importProgress(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.items || data.app !== 'guitare') {
        alert('⚠️ Ce fichier ne correspond pas à l\'application Guitare.');
        return;
      }
      var dateStr = data.date ? new Date(data.date).toLocaleDateString('fr-FR') : 'inconnue';
      if (!confirm('Remplacer ta progression actuelle par celle du fichier ?\n📅 Date de la sauvegarde : '+dateStr)) return;
      ALL_ITEMS.forEach(function(it) { if (data.items[it.key]) sr.items[it.key] = data.items[it.key]; });
      saveSR();
      render();
    } catch(x) {
      alert('⚠️ Fichier invalide ou corrompu.');
    }
  };
  reader.readAsText(file);
}

/* ════════════════════════════════════════════════════════════
   AUDIO — WebAudioFont (guitare nylon, lazy load)
════════════════════════════════════════════════════════════ */
var _WAFP_URL  = './audio/WebAudioFontPlayer.js';  // auto-hébergé (offline)
var _TONE_URL  = './audio/0240_FluidR3_GM_sf2_file.js';  // auto-hébergé (offline)
var _TONE_VAR  = '_tone_0240_FluidR3_GM_sf2_file';
var _OPEN_MIDI = [40, 45, 50, 55, 59, 64]; /* E2 A2 D3 G3 B3 e4 */
var _STRUM_S   = 0.045;
var _NOTE_DUR  = 4.5;
var _NOTE_VOL  = 0.72;
var _wafReady = false, _wafLoading = false;
var _wafCtx = null, _wafPlayer = null, _wafTone = null;

function _loadAudio(cb) {
  if (_wafReady)   { if (cb) cb(); return; }
  if (_wafLoading) { return; }
  _wafLoading = true;
  function _initTone() {
    _wafCtx    = new (window.AudioContext || window.webkitAudioContext)();
    _wafPlayer = new WebAudioFontPlayer();
    _wafPlayer.loader.startLoad(_wafCtx, _TONE_URL, _TONE_VAR);
    _wafPlayer.loader.waitLoad(function() {
      _wafTone = window[_TONE_VAR];
      _wafReady = true; _wafLoading = false;
      if (cb) cb();
    });
  }
  if (typeof WebAudioFontPlayer === 'undefined') {
    var s = document.createElement('script');
    s.src = _WAFP_URL;
    s.onload = _initTone;
    document.head.appendChild(s);
  } else { _initTone(); }
}

function playChordAudio(chord) {
  _loadAudio(function() {
    if (_wafCtx.state === 'suspended') _wafCtx.resume();
    var now = _wafCtx.currentTime + 0.04, si = 0;
    chord.frets.forEach(function(fret, i) {
      if (fret < 0) return;
      _wafPlayer.queueWaveTable(_wafCtx, _wafCtx.destination, _wafTone,
        now + si * _STRUM_S, _OPEN_MIDI[i] + fret, _NOTE_DUR, _NOTE_VOL);
      si++;
    });
    // coupe la reco micro pendant le son de l'app (anti auto-validation)
    try{ _crChroma=new Float32Array(12); _crPeak=new Float32Array(12); _crHoldSince=0; _crDinged=false; _crMuteUntil=performance.now()+(si*_STRUM_S)*1000+1800; }catch(e){}
  });
}

/* ════════════════════════════════════════════════════════════
   RECONNAISSANCE D'ACCORDS AU MICRO (beta)
   Détecteur chroma : on joue l'accord, l'app écoute au micro et
   reconnaît si toutes les notes cibles sont présentes (≥ CR_PRES)
   et qu'aucune note intruse n'est trop forte (< CR_INTR), maintenu
   CR_HOLDMS ms. Cordes : open pitch-classes E A D G B E = [4,9,2,7,11,4].
════════════════════════════════════════════════════════════ */
var _crCtx=null,_crStream=null,_crAnalyser=null,_crRAF=null,_crFreq=null,_crTime=null,_crRun=false;
var _crChroma=new Float32Array(12),_crIdx=0,_crHoldSince=0,_crAdvancing=false,_crLog=[],_crRms=0;
var _crDinged=false,_crMuteUntil=0,_crPeak=new Float32Array(12);

    _crStream=stream;
    var AC=window.AudioContext||window.webkitAudioContext; _crCtx=new AC();
    if(_crCtx.state==='suspended'){ try{ _crCtx.resume(); }catch(e){} }
    var src=_crCtx.createMediaStreamSource(stream);

    src.connect(_crAnalyser);

function crCapture(){
  var chord=CHORDS[_crIdx], pcs=crChordPCs(chord), i;
  var chroma=[]; for(i=0;i<12;i++) chroma.push(Math.round(_crPeak[i]*1000)/1000);
  var total=0,inSet=0,minT=1,maxI=0,maxIn=-1;
  for(i=0;i<12;i++){ total+=_crPeak[i]; if(pcs[i]){ inSet+=_crPeak[i]; if(_crPeak[i]<minT) minT=_crPeak[i]; } else if(_crPeak[i]>maxI){ maxI=_crPeak[i]; maxIn=i; } }
  var e={ i:_crLog.length+1, target:chord.name, id:chord.id,
    pcs:Object.keys(pcs).map(Number).sort(function(a,b){return a-b;}),
    chroma:chroma, rms:Math.round(_crRms*1000)/1000,
    scoreEnergy: total>0?Math.round(inSet/total*100)/100:0,
    minTarget:Math.round(minT*100)/100, maxIntruder:Math.round(maxI*100)/100,
    maxIntruderNote: maxIn>=0?CR_NOTES[maxIn]:null };
  _crLog.push(e);
  var c=document.getElementById('crLogCount');
  if(c) c.textContent=_crLog.length+' capture'+(_crLog.length>1?'s':'')+' · #'+e.i+' '+e.target+' : score '+Math.round(e.scoreEnergy*100)+'% · note mini cible '+Math.round(e.minTarget*100)+'% · intrus '+(e.maxIntruderNote||'—')+' '+Math.round(e.maxIntruder*100)+'%';
}

  try{ if(navigator.clipboard) navigator.clipboard.writeText(json); }catch(e){}
  try{ var blob=new Blob([json],{type:'application/json'}); var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='crlog-guitare.json'; document.body.appendChild(a); a.click(); setTimeout(function(){ if(a.parentNode) a.parentNode.removeChild(a); URL.revokeObjectURL(url); },150); }catch(e){}
  var ta=document.getElementById('crLogOut'); if(ta){ ta.style.display='block'; ta.value=json; ta.focus(); ta.select(); }
}
function crClearLog(){ _crLog=[]; var c=document.getElementById('crLogCount'); if(c) c.textContent='0 capture'; var ta=document.getElementById('crLogOut'); if(ta){ ta.value=''; ta.style.display='none'; } }

function crLoop(){
  if(!_crRun) return;
  if(!_crArmed){ _crRAF=requestAnimationFrame(crLoop); return; }
  var now=performance.now();
  if(now<_crMuteUntil){ _crRAF=requestAnimationFrame(crLoop); return; }
  _crAnalyser.getFloatFrequencyData(_crFreq);
  _crAnalyser.getFloatTimeDomainData(_crTime);
  var i, rms=0; for(i=0;i<_crTime.length;i++){ rms+=_crTime[i]*_crTime[i]; } rms=Math.sqrt(rms/_crTime.length);
  _crRms=rms; var quiet = rms<CR_GATE;
  var srate=_crCtx.sampleRate, N=_crAnalyser.fftSize, binHz=srate/N;
  var ch=new Float32Array(12);
  var kmin=Math.max(1,Math.floor(70/binHz)), kmax=Math.min(_crFreq.length-1,Math.ceil(1600/binHz));
  for(var k=kmin;k<=kmax;k++){ var f=k*binHz, amp=Math.pow(10,_crFreq[k]/20); var pitch=69+12*Math.log(f/440)/Math.LN2; var pc=((Math.round(pitch)%12)+12)%12; ch[pc]+=amp; }
  var mx=0; for(i=0;i<12;i++) if(ch[i]>mx) mx=ch[i];
  if(mx>0) for(i=0;i<12;i++) ch[i]/=mx;
  for(i=0;i<12;i++) _crChroma[i]+=((quiet?0:ch[i])-_crChroma[i])*0.4;
  for(i=0;i<12;i++){ var pk=_crPeak[i]*CR_DECAY; _crPeak[i]= _crChroma[i]>pk?_crChroma[i]:pk; }
  var chord=_crTarget||CHORDS[_crIdx], pcs=crChordPCs(chord);
  var minT=1, minPc=-1, maxI=0, maxIn=-1;
  for(i=0;i<12;i++){ if(pcs[i]){ if(_crPeak[i]<minT){ minT=_crPeak[i]; minPc=i; } } else if(_crPeak[i]>maxI){ maxI=_crPeak[i]; maxIn=i; } }
  var present=minT>=CR_PRES, clean=maxI<Math.max(CR_INTR, minT*CR_REL), okNow=present&&clean;
  if(okNow){ if(!_crHoldSince) _crHoldSince=now; } else { _crHoldSince=0; _crDinged=false; }
  var validated = _crHoldSince>0 && (now-_crHoldSince>=CR_HOLDMS);
  for(i=0;i<12;i++){ var fe=document.getElementById('crFill'+i); if(fe) fe.style.height=Math.max(2,Math.round(_crPeak[i]*100))+'%'; var be=document.getElementById('crBar'+i); if(be) be.className='cr-bar'+(pcs[i]?' tgt':'')+((pcs[i]&&_crPeak[i]>=CR_PRES)?' ok':((!pcs[i]&&_crPeak[i]>=CR_INTR)?' bad':'')); }
  var sc=document.getElementById('crScore'); if(sc) sc.textContent= quiet?'(silence)':'cible mini '+Math.round(minT*100)+'% (≥'+Math.round(CR_PRES*100)+') · intrus '+(maxIn>=0?CR_NOTES[maxIn]:'—')+' '+Math.round(maxI*100)+'% (<'+Math.round(Math.max(CR_INTR,minT*CR_REL)*100)+')';
  var vEl=document.getElementById('crVerdict'), tEl=document.getElementById('crTarget');
  var rh=document.getElementById('recogHint');
  if(validated){
    if(vEl){ vEl.textContent='✓ reconnu : '+chord.name; vEl.className='cr-verdict ok'; }
    if(tEl) tEl.className='cr-target ok';
    if(rh){ rh.textContent='✓ Accord reconnu !'; rh.className='recog-hint ok'; }
    if(!_crDinged){ _crDinged=true; if(now-_crLastDing>1500){ _crLastDing=now; crDing(); } if(_crOnMatch){ var cb=_crOnMatch; _crOnMatch=null; cb(); } }
  } else {
    if(tEl) tEl.className='cr-target';
    var msg = quiet?'Gratte l\'accord (toutes les cordes) et tiens' : (!present?'✗ il manque '+(minPc>=0?CR_NOTES[minPc]+' ('+crSolfege(minPc)+')':'une note') : (!clean?'✗ note en trop : '+(maxIn>=0?CR_NOTES[maxIn]+' ('+crSolfege(maxIn)+')':'?') : '✓ tiens la position…'));
    if(vEl){ vEl.textContent=msg; vEl.className='cr-verdict'+(okNow?'':' no'); }
    if(rh){ rh.textContent='\u{1F3A4} Joue l\'accord d\'un coup…'; rh.className='recog-hint'; }
  }
  _crRAF=requestAnimationFrame(crLoop);
}

function crPlayExample(){
  if(!_crCtx){ return; }
  if(_crCtx.state==='suspended'){ try{ _crCtx.resume(); }catch(e){} }
  var chord=CHORDS[_crIdx], t0=_crCtx.currentTime, stepT=0.42, dur=0.6, n=0;
  chord.frets.forEach(function(fr,i){
    if(fr<0) return;
    var midi=_OPEN_MIDI[i]+fr, f=440*Math.pow(2,(midi-69)/12), start=t0+n*stepT; n++;
    var master=_crCtx.createGain();
    master.gain.setValueAtTime(0.0001,start);
    master.gain.exponentialRampToValueAtTime(0.26,start+0.03);
    master.gain.exponentialRampToValueAtTime(0.0001,start+dur);
    master.connect(_crCtx.destination);
    [[f,1,'sine'],[f*2,0.15,'sine']].forEach(function(pp){ var o=_crCtx.createOscillator(),g=_crCtx.createGain(); o.type=pp[2]; o.frequency.value=pp[0]; g.gain.value=pp[1]; o.connect(g); g.connect(master); o.start(start); o.stop(start+dur+0.05); });
  });
  _crMuteUntil=performance.now()+(n*stepT+dur)*1000+200;
  _crHoldSince=0; _crDinged=false; for(var j=0;j<12;j++){ _crChroma[j]=0; _crPeak[j]=0; }
  var vEl=document.getElementById('crVerdict'); if(vEl){ vEl.textContent='\u{1F50A} Exemple…'; vEl.className='cr-verdict no'; }
}

var _historyReady = false;
var _chordDetailNav = false; // true quand prev/next dans chord-detail

function navBack() {
  if (isInFreeSession()) { app.screen = 'end'; render(); return; }
  if (_historyReady) history.back();
  else { app.screen = 'home'; render(); }
}
function navHome() {
  if (isInFreeSession()) { app.screen = 'end'; render(); return; }
  var d = (history.state && history.state.depth) || 0;
  if (_historyReady && d > 0) {
    history.go(-d);
  } else {
    app.screen = 'home';
    render();
  }
}

function _doRender(root) {
  if (app.screen !== 'cr-test' && app.screen !== 'session') crStop();
  if      (app.screen === 'home')           renderHome(root);
  else if (app.screen === 'submode-select') renderSubModes(root);
  else if (app.screen === 'mode-preview')   renderModePreview(root);
  else if (app.screen === 'custom-select')  renderCustomSelect(root);
  else if (app.screen === 'session')        renderSession(root);
  else if (app.screen === 'end')            renderEnd(root);
  else if (app.screen === 'reference')      renderReference(root);
  else if (app.screen === 'cr-test')        renderCRTest(root);
  else if (app.screen === 'chord-detail')   renderChordDetail(root);
}

function render() {
  var root = document.getElementById('app');
  root.innerHTML = '';
  if (_historyReady) {
    var curDepth = (history.state && history.state.depth) || 0;
    var st = { screen: app.screen, detailIds: app.detailIds, detailIdx: app.detailIdx, detailContext: app.detailContext, depth: curDepth };
    var pushable = ['reference', 'submode-select', 'custom-select', 'mode-preview', 'cr-test'];
    if (app.screen === 'home') {
      st.depth = 0;
      history.replaceState(st, '');
    } else if (pushable.indexOf(app.screen) !== -1) {
      st.depth = curDepth + 1;
      history.pushState(st, '');
    } else if (app.screen === 'chord-detail') {
      if (_chordDetailNav) {
        // prev/next : navigation latérale, garde la depth
        history.replaceState(st, '');
      } else {
        st.depth = curDepth + 1;
        history.pushState(st, '');
      }
      _chordDetailNav = false;
    } else {
      // session, end : remplace l'entrée courante (une seule slot pour toute la "vie" du quiz)
      history.replaceState(st, '');
    }
  }
  _doRender(root);
}

window.addEventListener('popstate', function(e) {
  var s = (e.state && e.state.screen) || 'home';

  // Mode libre en cours : back système → écran de fin (pas de sortie brutale)
  if (isInFreeSession() && s !== 'session') {
    // Re-pousse une entrée pour rester navigable
    history.pushState({ screen: 'end', depth: ((e.state && e.state.depth) || 0) + 1 }, '');
    app.screen = 'end';
    var rootFree = document.getElementById('app');
    rootFree.innerHTML = '';
    _doRender(rootFree);
    return;
  }

  // Filet de sécurité : session/end ne doivent jamais être restaurés via popstate
  if (s === 'session' || s === 'end') s = 'home';
  app.screen = s;
  if (e.state) {
    if (e.state.detailIds)            app.detailIds = e.state.detailIds;
    if (e.state.detailIdx != null)    app.detailIdx = e.state.detailIdx;
    if (e.state.detailContext)        app.detailContext = e.state.detailContext;
  }
  var root = document.getElementById('app');
  root.innerHTML = '';
  _doRender(root);
});
