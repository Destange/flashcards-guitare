/* ════════════════════════════════════════════════════════════
   SESSION
════════════════════════════════════════════════════════════ */
function renderSession(root) {
  var item  = app.item;
  var chord = byId(item.chordId);
  var mode  = ALL_MODES[app.modeId];
  var isFree = mode && mode.sandboxCorrect;

  // Barre + compteur : mode normal = X/10 fixe, mode libre = ratio corrects/total dynamique
  var progPct, progColor, counterText;
  if (isFree) {
    var total   = app.session.total;
    var correct = app.session.correct;
    progPct   = total === 0 ? 100 : Math.round((correct / total) * 100);
    progColor = progPct >= 75 ? '#7A9A35' : progPct >= 40 ? '#C49225' : '#C04848';
    counterText = correct + ' / ' + total;
  } else {
    progPct     = Math.round((app.session.total / SESSION_LENGTH) * 100);
    progColor   = mode.progColor;
    counterText = (app.session.total + 1) + ' / ' + SESSION_LENGTH;
  }

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'header';
  hdr.innerHTML =
    '<div class="header-title">Accords <b>Guitare</b></div>'+
    '<button class="btn-ghost" id="bHome">'+ICON_HOME+'<span>Accueil</span></button>';
  root.appendChild(hdr);
  document.getElementById('bHome').onclick = navHome;

  // Barre de progression
  var pg = document.createElement('div');
  pg.className = 'prog-wrap';
  pg.innerHTML =
    '<div class="prog-meta">'+
      '<span style="color:'+mode.progColor+';font-weight:500;">'+mode.icon+' '+mode.name+'</span>'+
      '<span class="tries-count">'+counterText+'</span>'+
    '</div>'+
    '<div class="prog-track"><div class="prog-fill" style="width:'+progPct+'%;background:'+progColor+'"></div></div>';
  root.appendChild(pg);

  // ── Toggle reco accords au micro (beta) — visible seulement si le mode beta est déverrouillé ──
  if (_betaReco) {
    var recogRow = document.createElement('div');
    recogRow.className = 'recog-row';
    recogRow.innerHTML =
      '<span class="recog-label">\u{1F3B8} Je joue l\'accord <span class="recog-beta">beta</span></span>'+
      '<button class="recog-switch'+(_recogOn?' on':'')+'" id="recogToggle" role="switch" aria-checked="'+(_recogOn?'true':'false')+'"><span class="recog-knob"></span></button>';
    root.appendChild(recogRow);
    if (item.side === 'name') {
      var rhEl = document.createElement('div'); rhEl.className='recog-hint'; rhEl.id='recogHint'; rhEl.textContent = _recogOn ? '\u{1F3A4} Joue l\'accord d\'un coup…' : ''; root.appendChild(rhEl);
    }
  }

  // Contenu des faces
  var frontHTML, backHTML, frontClass = 'front', backClass = 'back';
  if (item.side === 'name') {
    frontHTML =
      '<div class="face-tag">Joue cet accord<br>sur ta guitare</div>'+
      '<div class="chord-big '+sizeClass(chord.name)+'">'+chord.name+'</div>';
    backHTML =
      '<div class="face-tag hi">LA RÉPONSE !</div>'+
      '<div class="diag-holder">'+drawDiagram(chord,'lg')+'</div>';
    backClass += ' has-diag';
  } else {
    frontHTML =
      '<div class="face-tag">Trouve le nom<br>de cet accord</div>'+
      '<div class="diag-holder">'+drawDiagram(chord,'lg')+'</div>';
    backHTML =
      '<div class="face-tag hi">LA RÉPONSE !</div>'+
      '<div class="chord-big '+sizeClass(chord.name)+'">'+chord.name+'</div>';
    frontClass += ' has-diag';
  }

  var scene = document.createElement('div');
  scene.className = 'card-scene fadein';
  scene.innerHTML =
    '<div class="card-body" id="cBody">'+
      '<div class="card-face '+frontClass+'">'+frontHTML+'</div>'+
      '<div class="card-face '+backClass+'">'+backHTML+'</div>'+
    '</div>';
  root.appendChild(scene);
  // Son à la QUESTION : seulement si c'est un diagramme ET qu'aucune reco n'est active (sinon on couvrirait une réponse rapide)
  if (item.side === 'diagram' && !anyRecoOn()) setTimeout(function(){ playChordAudio(chord); }, 350);

  // ── Actions stack (grid stacking : bouton reveal + ok/ko à la même place) ──
  var actions = document.createElement('div');
  actions.className = 'actions-stack';

  var btnReveal = document.createElement('button');
  btnReveal.className = 'btn-main';
  btnReveal.innerHTML = '<span>Voir la réponse</span>' + ICON_ARROW_RIGHT;
  actions.appendChild(btnReveal);

  var btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  btnRow.id = 'bRow';
  btnRow.innerHTML =
    '<button class="btn-ko" id="bKo">✗&nbsp;&nbsp;À revoir</button>'+
    '<button class="btn-ok" id="bOk">✓&nbsp;&nbsp;Je savais !</button>';
  actions.appendChild(btnRow);

  root.appendChild(actions);

  var cBody = document.getElementById('cBody');
  var revealed = false;

  function reveal() {
    if (revealed) return;
    if (_recogOn && item.side === 'name') { _crOnMatch = null; _crArmed = false; }
    cBody.classList.add('flipped');
    btnReveal.classList.add('hidden');
    revealed = true;
    cBody.style.cursor = 'pointer';
    playChordAudio(chord);  // son à la réponse : TOUJOURS (réponse = diagramme ou nom)
    // Retire du DOM après le fade pour éviter tout résidu visuel (notamment sur mobile)
    setTimeout(function() {
      if (btnReveal && btnReveal.parentNode) btnReveal.parentNode.removeChild(btnReveal);
    }, 200);
    setTimeout(function() {
      var row = document.getElementById('bRow');
      if (row) row.classList.add('vis');
    }, 490);
  }

  btnReveal.onclick = reveal;

  // Après reveal : tap sur la carte = toggle question/réponse
  // Les boutons OK/KO restent visibles → pas de "triche" possible
  cBody.addEventListener('click', function() {
    if (!revealed) return;
    cBody.classList.toggle('flipped');
  });

  // ── Swipe tactile ────────────────────────────────────────
  // Avant reveal : swipe gauche = révéler la réponse
  // Après reveal : swipe gauche ou droite = toggle question/réponse
  var sStartX = 0, sStartY = 0, sActive = false;
  cBody.addEventListener('touchstart', function(e) {
    var t = e.changedTouches[0];
    sStartX = t.clientX; sStartY = t.clientY; sActive = true;
  }, { passive: true });
  cBody.addEventListener('touchend', function(e) {
    if (!sActive) return;
    sActive = false;
    var t = e.changedTouches[0];
    var dx = t.clientX - sStartX;
    var dy = t.clientY - sStartY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (!revealed && dx < 0) {
        reveal();
      } else if (revealed) {
        cBody.classList.toggle('flipped');
      }
    }
  }, { passive: true });

  function advance(correct) {
    var isSandbox = mode.sandboxCorrect;
    if (correct && !isSandbox) recordAnswer(item.key, true);
    if (!correct)              recordAnswer(item.key, false);
    if (correct) { playSuccess(app.session.streak); app.session.streak++; }
    else         { playFail();                       app.session.streak = 0; }
    // Buffer anti-repetition FIFO de 2
    app.recentChordIds.push(item.chordId);
    if (app.recentChordIds.length > 2) app.recentChordIds.shift();
    app.session.total++;
    if (correct) app.session.correct++;
    // Mode normal : fin a SESSION_LENGTH. Mode libre : continue jusqu'a ce que l'utilisateur clique Fin
    if (!isSandbox && app.session.total >= SESSION_LENGTH) {
      app.streakResult = recordStreak();
      app.screen = 'end';
    } else {
      app.item   = nextItem(app.modeId, app.recentChordIds);
      app.screen = 'session';
    }
    render();
  }
  document.getElementById('bOk').onclick = function() { advance(true);  };
  document.getElementById('bKo').onclick = function() { advance(false); };

  // ── Reco accords au micro (beta) : sur la face 'name' (« joue cet accord ») ──
  var _rtog = document.getElementById('recogToggle');
  if (_rtog) _rtog.onclick = function() {
    _recogOn = !_recogOn; recogSave();
    if (_recogOn) { recogIntro(function(){ render(); }); }
    else { crStop(); render(); }
  };
  if (_betaReco && _recogOn && item.side === 'name') {
    recogArm(chord, function() {
      reveal();
      setTimeout(function(){ var b=document.getElementById('bOk'); if (b) b.classList.add('attn'); }, 520);
    });
  } else if (_betaReco && _recogOn) {
    recogStandby();   // face diagramme : micro en veille (pas de détection)
  } else {
    crStop();
  }

  // Bouton "Fin de la session libre" — visible uniquement en mode libre
  if (isFree) {
    var btnEndFree = document.createElement('button');
    btnEndFree.className = 'btn-end-free';
    btnEndFree.innerHTML = '🏁 <span>Fin de la session libre</span>';
    root.appendChild(btnEndFree);
    btnEndFree.onclick = function() {
      if (app.session.total === 0) {
        // Aucune réponse → retour selection (sinon end screen vide)
        app.screen = 'custom-select';
      } else {
        app.screen = 'end';
      }
      render();
    };
  }
}

/* ════════════════════════════════════════════════════════════
   FIN DE SESSION
════════════════════════════════════════════════════════════ */
function renderEnd(root) {
  var mode    = ALL_MODES[app.modeId];
  var st      = getModeStats(app.modeId);
  var delta   = st.mastered - app.session.masteryAtStart;
  var correct = app.session.correct;
  var isSandbox    = mode.sandboxCorrect;
  // Mode normal : 10 questions fixes. Mode libre : total réel.
  var sessionTotal = isSandbox ? app.session.total : SESSION_LENGTH;

  var div = document.createElement('div');
  div.className = 'end-screen fadein';

  var masteryBlock;
  if (isSandbox) {
    var errors = sessionTotal - correct;
    var pctOk  = sessionTotal === 0 ? 0 : Math.round(correct / sessionTotal * 100);
    masteryBlock =
      '<div class="end-sandbox-card">'+
        '<div class="end-sandbox-title">✏️ Session libre — '+pctOk+'% de réussite</div>'+
        '<div class="end-sandbox-body">'+
          (sessionTotal === 0
            ? 'Tu n\'as répondu à aucune question — rien n\'a été enregistré.'
            : (errors > 0
                ? errors+' erreur'+(errors>1?'s':'')+' enregistrée'+(errors>1?'s':'')+' dans ta progression.<br>Les bonnes réponses ne comptent pas en mode libre — elles ne faussent pas ton score réel.'
                : 'Aucune erreur — rien n\'a changé dans ta progression.<br>Lance un vrai mode pour que tes réussites comptent !'))+
        '</div>'+
      '</div>';
  } else {
    masteryBlock =
      '<div class="end-mastery-card">'+
        '<div class="end-mastery-title">Progression globale</div>'+
        '<div class="end-mastery-row">'+
          '<div class="end-m-val">'+st.mastered+'<span class="slash"> / '+st.total+'</span></div>'+
          '<div class="end-track">'+
            '<div class="end-prog-track"><div class="end-prog-fill" id="endFill" style="width:0%;background:'+mode.progColor+'"></div></div>'+
            '<div class="end-prog-pct">'+st.pct+'% maîtrisé</div>'+
          '</div>'+
        '</div>'+
        (delta > 0
          ? '<div class="end-m-delta up">+'+delta+' face'+(delta>1?'s':'')+' maîtrisée'+(delta>1?'s':'')+' cette session 🎉</div>'
          : '<div class="end-m-delta same">Continue pour progresser !</div>')+
      '</div>';
  }

  var badgeStyle = 'background:'+mode.progColor+'22;color:'+mode.progColor+';';
  div.innerHTML =
    '<div class="end-badge" style="'+badgeStyle+'">'+mode.icon+' '+mode.name+'</div>'+
    '<div class="end-score-wrap popin">'+
      '<span class="end-emoji">'+sessionEmoji(correct, sessionTotal)+'</span>'+
      '<div class="end-score">'+correct+'<span> / '+sessionTotal+'</span></div>'+
      '<div class="end-label">'+sessionMsg(correct, sessionTotal)+'</div>'+
    '</div>'+
    masteryBlock+
    (function(){
      var sk = app.streakResult;
      if (!sk || sk.count < 1) return '';
      var dayWord = sk.count > 1 ? 'jours de suite' : '1er jour';
      return '<div class="end-streak-card">'+
        '<div class="end-streak-left">'+
          '<div class="end-streak-flame">🔥</div>'+
          '<div><div class="end-streak-count">'+sk.count+'</div>'+
          '<div class="end-streak-lbl">'+dayWord+'</div></div>'+
        '</div>'+
        '<div class="end-streak-best"><strong>'+sk.best+'</strong>record</div>'+
      '</div>';
    }())+
    '<div class="end-btn-row">'+
      '<button class="btn-home-end" id="bEndHome">'+ICON_HOME+'<span>Accueil</span></button>'+
      '<button class="btn-replay" id="bReplay" style="background:'+mode.progColor+'">'+ICON_RELOAD+'<span>Rejouer</span></button>'+
    '</div>';
  root.appendChild(div);

  if (!isSandbox) {
    setTimeout(function() { var f = document.getElementById('endFill'); if(f) f.style.width = st.pct+'%'; }, 120);
  }
  // Fanfare : uniquement mode normal et série parfaite. Pas en mode libre (drill, pas compétition).
  if (!isSandbox && correct === SESSION_LENGTH) setTimeout(function() { playVictory(); }, 200);

  document.getElementById('bEndHome').onclick = navHome;
  document.getElementById('bReplay').onclick  = function() {
    if (app.modeId === 'custom') { app.screen = 'custom-select'; render(); return; }
    var st0 = getModeStats(app.modeId);
    app.session = { correct:0, total:0, masteryAtStart:st0.mastered, streak:0 };
    app.recentChordIds = [];
    app.item    = nextItem(app.modeId, app.recentChordIds);
    app.screen  = 'session';
    render();
  };
}

/* ════════════════════════════════════════════════════════════
   APERÇU D'EXERCICE — grille des accords avant la session
════════════════════════════════════════════════════════════ */
function renderModePreview(root) {
  var mode     = ALL_MODES[app.modeId];
  var chordIds = (mode.chordIds || CHORDS.map(function(c){ return c.id; }));

  var div = document.createElement('div');
  div.className = 'preview-screen fadein';

  var top = document.createElement('div');

var MIN_CUSTOM = 3;
function renderCustomSelect(root) {
  var sel = app.customChordIds.slice();

  // ── Frame construit UNE FOIS ──────────────────────────────
  var div = document.createElement('div');
  div.className = 'sel-screen fadein';

  var top = document.createElement('div');
  top.className = 'sel-top';
  top.innerHTML = '<button class="btn-nav-back" id="sBk">'+ICON_BACK+'<span class="nav-label">Retour</span></button><h2 class="ref-h">Session libre</h2>';
  div.appendChild(top);

  var meta = document.createElement('div');
  meta.className = 'sel-meta';
  div.appendChild(meta);

  var grid = document.createElement('div');
  grid.className = 'sel-grid';

  // Référencer chaque carte pour toggle direct sans rebuild
  var cardRefs = [];
  CHORDS.forEach(function(c) {
    var isSelected = sel.indexOf(c.id) !== -1;
    var item = document.createElement('div');
    item.className = 'sel-item' + (isSelected ? ' selected' : '');
    item.innerHTML =
      '<div class="sel-check">✓</div>'+
      drawDiagram(c,'sm')+
      '<div class="sel-item-name">'+c.name+'</div>';
    item.onclick = function() {
      var idx = sel.indexOf(c.id);
      if (idx === -1) { sel.push(c.id); item.classList.add('selected'); }
      else            { sel.splice(idx, 1); item.classList.remove('selected'); }
      updateMeta();
    };
    grid.appendChild(item);
    cardRefs.push({ id: c.id, el: item });
  });
  div.appendChild(grid);

  var btnStart = document.createElement('button');
  btnStart.className = 'btn-start-custom';
  btnStart.innerHTML = '<span>Démarrer</span>' + ICON_ARROW_RIGHT;
  div.appendChild(btnStart);

  var note = document.createElement('p');
  note.className = 'custom-sandbox-note';
  note.innerHTML = 'Session sans fin · Les erreurs affectent ta progression,<br>les bonnes réponses ne la modifient pas';
  div.appendChild(note);

  root.appendChild(div);

  // ── Update partiel : meta + état du bouton uniquement ────
  function updateMeta() {
    var n   = sel.length;
    var cls = n >= MIN_CUSTOM ? 'ok' : n > 0 ? 'warn' : 'bad';
    var lbl = n >= MIN_CUSTOM
      ? n+' accord'+(n>1?'s':'')+' sélectionné'+(n>1?'s':'')+' ✓'
      : n+' / '+MIN_CUSTOM+' minimum';
    meta.innerHTML =
      '<span class="sel-count '+cls+'">'+lbl+'</span>'+
      '<div class="sel-actions">'+
        '<button class="btn-sel-link" id="sAll">Tout</button>'+
        '<button class="btn-sel-link" id="sClear">Effacer</button>'+
      '</div>';
    document.getElementById('sAll').onclick = function() {
      sel = CHORDS.map(function(c){ return c.id; });
      cardRefs.forEach(function(r){ r.el.classList.add('selected'); });
      updateMeta();
    };
    document.getElementById('sClear').onclick = function() {
      sel = [];
      cardRefs.forEach(function(r){ r.el.classList.remove('selected'); });
      updateMeta();
    };
    btnStart.disabled = sel.length < MIN_CUSTOM;
  }
  updateMeta();

  document.getElementById('sBk').onclick = navBack;

  btnStart.onclick = function() {
    if (sel.length < MIN_CUSTOM) return;
    app.customChordIds = sel.slice();
    saveCustomSel(app.customChordIds);
    app.modeId  = 'custom';
    app.session = { correct:0, total:0, masteryAtStart:0, streak:0 };
    app.recentChordIds = [];
    app.item    = nextItem('custom', app.recentChordIds);
    app.screen  = 'session';
    render();
  };
}

function renderReference(root) {
  var div = document.createElement('div');
  div.className = 'ref-screen fadein';

  var top = document.createElement('div');
  top.className = 'ref-top';
  top.innerHTML = '<button class="btn-nav-back" id="bBack">'+ICON_BACK+'<span class="nav-label">Retour</span></button><h2 class="ref-h">Tous les accords</h2>';
  div.appendChild(top);

  var sortBar = document.createElement('div');
  sortBar.className = 'sort-bar';
  [['alpha','A–Z'],['best','⭐ Mieux maîtrisés'],['worst','⚠️ À travailler']].forEach(function(s) {
    var b = document.createElement('button');
    b.className = 'sort-btn' + (app.refSort === s[0] ? ' active' : '');
    b.textContent = s[1];
    b.onclick = function() { app.refSort = s[0]; root.innerHTML=''; renderReference(root); };
    sortBar.appendChild(b);
  });
  div.appendChild(sortBar);

  var sorted = CHORDS.slice();
  if (app.refSort === 'alpha') sorted.sort(function(a,b){ return a.name.localeCompare(b.name); });
  else if (app.refSort === 'best')  sorted.sort(function(a,b){ return chordMastery(b.id) - chordMastery(a.id); });
  else sorted.sort(function(a,b){ return chordMastery(a.id) - chordMastery(b.id); });

  var grid = document.createElement('div');
  grid.className = 'ref-grid';
  sorted.forEach(function(c, idx) {
    var m   = chordMastery(c.id);
    var pct = Math.round(m * 100);
    var col = pct === 100 ? '#12B558'
            : m >= 0.75   ? '#7A9A35'
            : m >= 0.4    ? '#C49225'
            :               '#C04848';
    var pctLabel = pct === 100 ? '✔️' : pct + '%';
    var card = document.createElement('div');
    card.className = 'ref-item';
    card.innerHTML =
      drawDiagram(c,'sm')+
      '<div class="ref-name">'+c.name+'</div>'+
      '<div class="ref-bar"><div class="ref-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
      '<div class="ref-pct">'+pctLabel+'</div>';
    card.onclick = function() {
      app.detailIds     = sorted.map(function(x){ return x.id; });
      app.detailIdx     = idx;
      app.detailContext = 'reference';
      app.screen        = 'chord-detail';
      render();
    };
    grid.appendChild(card);
  });
  div.appendChild(grid);

  var footer = document.createElement('div');
  footer.className = 'ref-footer';
  footer.innerHTML = '<button class="btn-reset" id="bReset">Réinitialiser toute la progression</button>';
  div.appendChild(footer);

  root.innerHTML = '';
  root.appendChild(div);

  document.getElementById('bBack').onclick = navBack;
  document.getElementById('bReset').onclick = function() {
    if (confirm('Effacer toute la progression ? Cette action est irréversible.')) { resetSR(); render(); }
  };
}

/* ── CHORD DETAIL ── */
function renderChordDetail(root) {
  var ids = app.detailIds;

  // ── Frame UNIQUE (top + stack + legende + nav) ────────────
  var div = document.createElement('div');
  div.className = 'detail-screen fadein';

  var top = document.createElement('div');
  top.className = 'detail-top';
  var counterSpan = document.createElement('span');
  counterSpan.className = 'detail-counter';
  // Titre : "Dictionnaire" depuis le référentiel, nom du mode depuis un preview
  var title = 'Dictionnaire';
  if (app.detailContext === 'mode-preview' && ALL_MODES[app.modeId]) {
    title = ALL_MODES[app.modeId].icon + ' ' + ALL_MODES[app.modeId].name;
  }
  top.innerHTML =
    '<button class="btn-nav-back" id="dBack">'+ICON_BACK+'<span class="nav-label">Retour</span></button>'+
    '<h2 class="ref-h">'+title+'</h2>';
  top.appendChild(counterSpan);
  div.appendChild(top);

  // Stack : conteneur grid stable, cartes en grid-area: card
  var stack = document.createElement('div');
  stack.className = 'detail-card-stack';
  var currentCard = document.createElement('div');
  currentCard.className = 'detail-card';
  if (!_chordDetailNav) currentCard.classList.add('popin'); // popin uniquement à l'entrée
  stack.appendChild(currentCard);
  div.appendChild(stack);

  var leg = document.createElement('div');
  leg.className = 'detail-legend';
  [['1','index'],['2','majeur'],['3','annulaire'],['4','auriculaire'],['P','pouce']].forEach(function(p) {
    leg.innerHTML += '<span><div class="det-dot">'+p[0]+'</div>'+p[1]+'</span>';
  });
  div.appendChild(leg);

  var nav = document.createElement('div');
  nav.className = 'detail-nav';
  var bPrev = document.createElement('button');
  bPrev.className = 'btn-nav';
  bPrev.innerHTML = '<span class="btn-nav-ic prev">'+ICON_BACK+'</span><span>Précédent</span>';
  var bNext = document.createElement('button');
  bNext.className = 'btn-nav';
  bNext.innerHTML = '<span>Suivant</span><span class="btn-nav-ic next">'+ICON_ARROW_RIGHT+'</span>';
  nav.appendChild(bPrev);
  nav.appendChild(bNext);
  div.appendChild(nav);

  root.appendChild(div);

  // ── Builder du contenu d'une carte ────────────────────────
  function buildCardHTML(chordId) {
    var c = byId(chordId);
    var m = chordMastery(c.id);
    var pct = Math.round(m * 100);
    var col = pct === 100 ? '#12B558' : m >= 0.75 ? '#7A9A35' : m >= 0.4 ? '#C49225' : '#C04848';
    var pctLabel = pct === 100 ? '✔️' : pct + '%';
    return '<div class="detail-name">'+c.name+'</div>'+
      '<div class="detail-diag">'+drawDiagram(c,'lg')+'</div>'+
      '<div class="detail-prog-row">'+
        '<div class="detail-bar"><div class="detail-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
        '<div class="detail-pct">'+pctLabel+' maîtrisé</div>'+
      '</div>';
  }

  function syncUI(idx) {
    counterSpan.textContent = (idx + 1) + ' / ' + ids.length;
    bPrev.disabled = (idx === 0);
    bNext.disabled = (idx === ids.length - 1);
    // History replace pour que back ramène à la reference (pas aux cartes précédentes)
    if (_historyReady && history.state && history.state.screen === 'chord-detail') {
      var st = Object.assign({}, history.state, { detailIdx: idx });
      history.replaceState(st, '');
    }
  }

  // Render initial
  currentCard.innerHTML = buildCardHTML(ids[app.detailIdx]);
  syncUI(app.detailIdx);
  _chordDetailNav = false;

  // ── Navigation avec animation Tinder (via keyframes) ─────
  var animating = false;
  function navigateTo(newIdx, dir) {
    if (animating) return;
    if (newIdx < 0 || newIdx >= ids.length) return;
    animating = true;

    app.detailIdx = newIdx;

    // Nouvelle carte insérée DERRIÈRE (insertBefore + classe `behind`)
    var newCard = document.createElement('div');
    newCard.className = 'detail-card behind';
    newCard.innerHTML = buildCardHTML(ids[newIdx]);
    stack.insertBefore(newCard, currentCard);

    // Carte courante : monte en couche supérieure puis s'envole
    currentCard.classList.remove('popin');
    currentCard.classList.add('front-anim');
    void currentCard.offsetWidth; // force reflow avant l'animation
    currentCard.classList.add(dir > 0 ? 'fly-out-left' : 'fly-out-right');

    // Nouvelle carte : remonte au premier plan via @keyframes
    newCard.classList.remove('behind');
    newCard.classList.add('coming-in');

    syncUI(newIdx);

    var oldCard = currentCard;
    currentCard = newCard;

    setTimeout(function() {
      if (oldCard && oldCard.parentNode) oldCard.parentNode.removeChild(oldCard);
      currentCard.classList.remove('coming-in');
      animating = false;
    }, 460);
  }

  function goPrev() { navigateTo(app.detailIdx - 1, -1); }
  function goNext() { navigateTo(app.detailIdx + 1,  1); }

  // ── Swipe tactile (gauche = suivant, droite = précédent) ─
  var touchStartX = 0, touchStartY = 0, touchActive = false;
  stack.addEventListener('touchstart', function(e) {
    if (animating) return;
    var t = e.changedTouches[0];
    touchStartX = t.clientX; touchStartY = t.clientY; touchActive = true;
  }, { passive: true });
  stack.addEventListener('touchend', function(e) {
    if (!touchActive) return;
    touchActive = false;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStartX;
    var dy = t.clientY - touchStartY;
    // Seuil 50px et mouvement principalement horizontal
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) goNext();
      else        goPrev();
    }
  }, { passive: true });

  document.getElementById('dBack').onclick = navBack;
  bPrev.onclick = goPrev;
  bNext.onclick = goNext;
}

var OB_KEY='gtr_onboard_v1';

function obIsStandalone(){ try{ return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone===true; }catch(e){ return false; } }
function obPlatform(){
  var ua=navigator.userAgent||'';
  if(/iPad|iPhone|iPod/.test(ua) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1)) return 'ios';
  if(/Android/i.test(ua)) return 'android';

function obEl(tag,cls){ var e=document.createElement(tag); if(cls) e.className=cls; return e; }
function obRemove(id){ var e=document.getElementById(id); if(e&&e.parentNode) e.parentNode.removeChild(e); }
function obQR(){ var q=document.getElementById('obQrSrc'); return q?q.innerHTML:''; }
function obStepHTML(n,tt,bd){ return '<div class="ob-step"><div class="ob-step-n">'+n+'</div><div><div class="ob-step-tt">'+tt+'</div><div class="ob-step-bd">'+bd+'</div></div></div>'; }
function obInstallContent(plat){

      + obStepHTML(1,'🌐 Ouvre dans Chrome','Ouvre cette page avec Google Chrome sur ton Android.')
      + obStepHTML(2,'⋮ Ouvre le menu','Touche le menu en haut à droite de Chrome.')
      + obStepHTML(3,'📲 Installe l\'application','Touche « Installer l\'application » ou « Ajouter à l\'écran d\'accueil », puis confirme.');
  }
  return '<button class="ob-native" id="obNative" style="display:'+(_obDeferredPrompt?'':'none')+'">💻 Installer sur cet ordinateur</button>'

var _obTour=[], _obIdx=0;
function obTourStart(){
  if(app.screen!=='home'){ app.screen='home'; render(); }
  var steps=[
    {sel:'#modeCards', t:'Choisis un mode', b:'Sélectionne un niveau et révise tes accords avec les <b>flashcards</b> : l\'app te repropose chaque accord au bon moment pour bien le mémoriser, et retire les accords que tu as déjà mémorisés.'},
    {sel:'#bCustom', t:'Session libre', b:'Crée ta propre session avec uniquement les accords que tu veux travailler. Minimum 3 accords. Progression non enregistrée.'},
    {sel:'#bRef', t:'Tous les accords', b:'Ouvre la bibliothèque complète : chaque accord avec son diagramme de doigté, ainsi que ton niveau de maîtrise de celui-ci.'},
    {sel:'.streak-home', t:'Ta série', b:'Reviens chaque jour pour entretenir ta série 🔥 et garder le rythme.'},
    {sel:'.home-data-bar', t:'Ta sauvegarde', b:'Exporte ta progression et réimporte-la si tu changes de téléphone — rien n\'est perdu !'}
  ];
  _obTour=steps.filter(function(st){ return document.querySelector(st.sel); });
  _obIdx=0;
  if(!_obTour.length){ obFinish(); return; }
  obTourShow();
}
function obPlaceTip(){
  var spot=document.getElementById('obSpot'), tip=document.getElementById('obTip');
  if(!spot||!_obTour[_obIdx]) return;
  var el=document.querySelector(_obTour[_obIdx].sel); if(!el) return;
  var r=el.getBoundingClientRect(), pad=8;
  spot.style.left=(r.left-pad)+'px'; spot.style.top=(r.top-pad)+'px';
  spot.style.width=(r.width+pad*2)+'px'; spot.style.height=(r.height+pad*2)+'px';
  if(tip){
    var th=tip.offsetHeight, tw=tip.offsetWidth, vh=window.innerHeight, vw=window.innerWidth;
    var top=r.bottom+pad+10; if(top+th>vh-10) top=r.top-pad-10-th; if(top<10) top=10;
    var left=r.left+r.width/2-tw/2; if(left<14) left=14; if(left+tw>vw-14) left=vw-14-tw;
    tip.style.top=top+'px'; tip.style.left=left+'px';
  }
}
function obTourShow(){
  obRemove('obSpot'); obRemove('obTip');
  var step=_obTour[_obIdx];
  var el=document.querySelector(step.sel);
  if(!el){ obTourNext(); return; }
  el.scrollIntoView({block:'center', behavior:'smooth'});
  setTimeout(function(){
    var spot=obEl('div','ob-tour-spot'); spot.id='obSpot'; document.body.appendChild(spot);
    var last=(_obIdx===_obTour.length-1);
    var tip=obEl('div','ob-tour-tip'); tip.id='obTip';
    tip.innerHTML='<div class="ob-tip-count">'+(_obIdx+1)+' / '+_obTour.length+'</div>'+
      '<div class="ob-tip-title">'+step.t+'</div>'+
      '<div class="ob-tip-body">'+step.b+'</div>'+
      '<div class="ob-tip-actions"><button class="ob-tip-skip" id="obTipSkip">Passer la visite</button>'+
      '<button class="ob-tip-next" id="obTipNext">'+(last?'Terminer ✓':'Suivant →')+'</button></div>';
    document.body.appendChild(tip);
    obPlaceTip();
    document.getElementById('obTipSkip').onclick=obFinish;
    document.getElementById('obTipNext').onclick=obTourNext;
  }, 340);
}
function obTourNext(){ _obIdx++; if(_obIdx>=_obTour.length){ obFinish(); return; } obTourShow(); }
function obTourEnd(){ obRemove('obSpot'); obRemove('obTip'); }
function obFinish(){ obTourEnd(); obRemove('obOverlay'); obMarkDone(); }
function obStart(force){ if(obIsStandalone() && !force){ obTourStart(); return; } obShowInstall(); }
window.addEventListener('scroll', obPlaceTip, true);
window.addEventListener('resize', obPlaceTip);

render();
history.replaceState({ screen: 'home' }, '');
_historyReady = true;
/* lancer l'onboarding au tout premier lancement */

/* ════════════════════════════════════════════════════════════
   SERVICE WORKER + DÉTECTION MISE À JOUR
   - Popup centrée bloquante, sans dismiss
   - Affichée uniquement sur l'accueil (jamais pendant une session)
   - Si update détectée pendant une session : attend le retour à l'accueil
════════════════════════════════════════════════════════════ */
var _updatePending  = false;  // true quand une nouvelle version est prête mais pas encore montrée
var _updateShown    = false;  // true quand la popup est affichée → évite doublon
var _reloading      = false;  // évite double reload si controllerchange + click simultanés

function showUpdatePopup() {
  if (_updateShown) return;
  _updateShown = true;
  var overlay = document.createElement('div');
  overlay.className = 'update-overlay';
  overlay.id = 'updateOverlay';
  overlay.innerHTML =
    '<div class="update-popup">'+
      '<div class="update-popup-icon">🎸</div>'+
      '<div class="update-popup-title">Nouvelle version disponible</div>'+
      '<div class="update-popup-body">Une mise à jour de l\'app est prête.</div>'+
      '<button class="update-popup-btn" id="updateBtn">Actualiser maintenant</button>'+
    '</div>';
  document.body.appendChild(overlay);
  document.getElementById('updateBtn').onclick = function() {
    if (_reloading) return;
    _reloading = true;
    // skipWaiting() est déjà dans sw.js → le nouveau SW prend le contrôle dès l'install.
    // controllerchange déclenchera le reload, mais on force aussi ici en filet de sécurité.
    window.location.reload();
  };
}

// Tente d'afficher la popup si pertinent : update prête + sur l'accueil
function maybeShowUpdate() {
  if (_updatePending && !_updateShown && app.screen === 'home') {
    showUpdatePopup();
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then(function(reg) {
      // Détecter qu'un nouveau SW est en cours d'installation
      reg.addEventListener('updatefound', function() {
        var newSW = reg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', function() {
          // Nouveau SW installé ET un ancien existait → vraie mise à jour (pas premier install)
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            _updatePending = true;
            maybeShowUpdate();
          }
        });
      });
    });

    // Re-check des updates au focus de la fenêtre (utile pour PWA gardée ouverte plusieurs jours)
    window.addEventListener('focus', function() {
      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (reg) reg.update();
      });
    });
  });

  // Quand le nouveau SW prend le contrôle → reload pour servir les nouveaux assets
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (_reloading) return;
    _reloading = true;
    window.location.reload();
  });
}
</script>
</body>
</html>
